source = ./themes/matugen-colors.conf

background {
  monitor =
  path = $image
  color = $background
  blur_passes = 3
}

image {
  monitor =
  path = $HOME/.face
  size = 200
  rounding = 100 # makes icon round
  border_size = 0

  position = 0, 160
  halign = center
  valign = center
}

input-field {
  monitor =
  size = 20%, 5%
  outline_thickness = 3

  inner_color = $background
  outer_color = $primary
  check_color = $secondary
  fail_color = $error

  font_color = $on_background
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  fade_on_empty = false
  rounding = 15

  position = 0, -20
  halign = center
  valign = center
}

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %Y-%m-%d %H:%M")"
  color = $on_background
  font_size = 24
  font_family = Hack Nerd Font

  position = 0, -120
  halign = center
  valign = center
}
