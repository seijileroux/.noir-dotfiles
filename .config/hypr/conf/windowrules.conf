# Ignore maximize requests from apps. You'll probably like this.
windowrule = match:class .*, suppress_event maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0, no_focus on

# Bind 9 workspaces to external monitor
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1
workspace = 10, monitor:eDP-1

# Float windows
windowrule = match:class ^(blueman-manager)$, float on, size (monitor_w*0.8) (monitor_h*0.8), center on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on, size (monitor_w*0.8) (monitor_h*0.8), center on
windowrule = match:title (wants to save), float on, size (monitor_w*0.8) (monitor_h*0.8), center on # Brave save file
windowrule = match:title (Save File), float on, size (monitor_w*0.8) (monitor_h*0.8), center on # Brave save file
windowrule = match:title (Choose Mod), float on, size (monitor_w*0.8) (monitor_h*0.8), center on # Wine windows file manager
windowrule = match:title (Open), float on, size (monitor_w*0.8) (monitor_h*0.8), center on
windowrule = match:class ^(file-png|file-jpg|file-jpeg|file-webp)$, float on, size (monitor_w*0.8) (monitor_h*0.8), center on
windowrule = match:class ^(org.freedesktop.impl.portal.desktop.kde)$, float on, size (monitor_w*0.8) (monitor_h*0.8), center on # KDE File Picker (save and open)

windowrule = match:class ^()$,match:title ^(Save File)$, float on
windowrule = match:class ^()$,match:title ^(Open File)$, float on
windowrule = match:class ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$, float on
windowrule = match:class ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1)(.*)$, float on
windowrule = match:class ^(CachyOSHello)$, float on
windowrule = match:class ^(zenity)$, float on
windowrule = match:class ^()$, match:title ^(Steam - Self Updater)$, float on
windowrule = match:class ^(AmneziaVPN)$, float on, center on
windowrule = match:class ^(qalculate-gtk)$, float on, center on

# Tile Windows
windowrule = match:title (Gitnuro), tile on

# Center windows
windowrule = match:class ^(Brave)$, center on
windowrule = match:title (wants to save), center on
windowrule = match:title (Save File), center on
windowrule = match:title (Choose Mod), center on
windowrule = match:class ^()$, match:title ^(Open File)$, center on
windowrule = match:title (Open), center on
windowrule = match:title (Google), center on

# Size of windows
windowrule = match:title (Open), size (monitor_w*0.8) (monitor_h*0.8)
windowrule = match:title (Google), size (monitor_w*0.8) (monitor_h*0.8)

# Opacity
windowrule = match:class ^(thunar|nemo|org.kde.dolphin)$, opacity 0.95
windowrule = match:class ^(VSCodium|code-oss|cursor)$, opacity 0.8
windowrule = match:class ^(discord|armcord|webcord|vesktop)$, opacity 0.9
windowrule = match:title ^(QQ|Telegram)$, opacity 0.8
windowrule = match:title ^(NetEase Cloud Music Gtk4)$, opacity 0.8
windowrule = match:class ^(obsidian)$, opacity 0.8

# General window rules
windowrule = match:title ^(Picture-in-Picture)$, float on, size 640 360, move monitor_w-660 monitor_h-380, focus_on_activate off, no_initial_focus on, pin on
windowrule = match:title ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$, float on
windowrule = match:title ^(danmufloat)$, pin on
windowrule = match:title ^(danmufloat|termfloat)$, rounding 5
windowrule = match:class ^(org.mozilla.firefox)$, no_blur on
windowrule = match:class Rofi, no_blur on
windowrule = match:class ^(org.kde.kded6)$, stay_focused on # KDE/Dolphin password prompt
windowrule = match:title ^(File Already Exists — Dolphin)$, stay_focused on, pin on # KDE/Dolphin file already exists prompt
windowrule = match:title ^(Already Exists as Folder — Dolphin)$, stay_focused on, pin on # KDE/Dolphin folder already exists prompt


# Open Thunar File Transfer windows floating and in bottom right corner
windowrule = match:title (File Operation Progress), float on
# windowrule = match:title (File Operation Progress), move 100%-670 100%-210

# Screen Shraring window rules (Workaround for XWayland Applications)
windowrule = match:class ^(xwaylandvideobridge)$, opacity 0.0 override, no_anim on, no_initial_focus on, max_size 1 1, no_blur on, no_focus on

# IntelliJ Flickering Fixes
windowrule = match:class (jetbrains-.*), no_initial_focus 1

